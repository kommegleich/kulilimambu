    <main class="contact-detail">
        <div class="contact-content">
            <h2 class="project-main-title">CONTACT</h2>

            <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID_HERE" method="POST" id="contactForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your Name">
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                    </div>

                    <div class="form-group half-width">
                        <label for="phone">Phone Number</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <select id="countryCode" name="countryCode"
                                style="width: auto; flex-shrink: 0; min-width: 90px;">
                                <option value="+82">+82 (KR)</option>
                                <option value="+1">+1 (US/CA)</option>
                                <option value="+81">+81 (JP)</option>
                                <option value="+86">+86 (CN)</option>
                                <option value="+44">+44 (UK)</option>
                                <option value="+61">+61 (AU)</option>
                            </select>
                            <input type="tel" id="phone" name="phone" placeholder="10-1234-5678" style="flex-grow: 1;">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required
                        placeholder="How can I help you?"></textarea>
                </div>

                <div class="submit-wrapper" style="text-align: center; width: 100%;">
                    <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
                </div>
            </form>
        </div>
    </main>
